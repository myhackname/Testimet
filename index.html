<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Studentët FSHN Analistike</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f172a;font-family:'Sora',sans-serif;color:#f8fafc}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeIn .3s ease}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#0f172a}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
    input,textarea,select,button{font-family:'Sora',sans-serif}
    textarea{resize:vertical}

    /* Layout */
    #app{display:flex;min-height:100vh}
    #sidebar{width:260px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow:hidden}
    #main{flex:1;overflow:auto;padding:28px 32px}
    #login-wrap{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center}

    /* Sidebar parts */
    .sb-brand{padding:22px 20px;border-bottom:1px solid #334155}
    .sb-brand .tag{font-size:10px;letter-spacing:3px;color:#3b82f6;font-weight:700;text-transform:uppercase}
    .sb-brand .title{font-size:18px;font-weight:800;color:#f8fafc;margin-top:4px}
    .sb-brand .sub{font-size:12px;color:#64748b;margin-top:2px}
    .sb-brand .live{font-size:11px;color:#10b981;margin-top:6px;display:flex;align-items:center;gap:5px}
    .sb-brand .live span{width:6px;height:6px;background:#10b981;border-radius:50%;display:inline-block}
    .sb-nav{flex:1;padding:14px 10px;overflow-y:auto}
    .nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;border:none;background:transparent;color:#94a3b8;font-size:14px;font-weight:400;cursor:pointer;margin-bottom:3px;text-align:left;transition:all .15s;border-left:3px solid transparent}
    .nav-btn:hover{background:rgba(59,130,246,0.08);color:#cbd5e1}
    .nav-btn.active{background:rgba(59,130,246,0.15);color:#3b82f6;font-weight:600;border-left:3px solid #3b82f6}
    .nav-btn .ico{font-size:17px}
    .sb-user{padding:14px 18px;border-top:1px solid #334155}
    .sb-user .uinfo{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
    .uname{font-size:13px;font-weight:600;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .urole{font-size:11px;color:#10b981}
    .btn-logout{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#ef4444;font-size:13px;cursor:pointer}
    .btn-logout:hover{background:rgba(239,68,68,0.1)}

    /* Cards */
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:22px}
    .card-title{font-size:16px;font-weight:700;color:#f8fafc;margin-bottom:18px}

    /* Grid helpers */
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
    .g2{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .g2eq{display:grid;grid-template-columns:1fr 1fr;gap:18px}

    /* Stat card */
    .stat-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:6px}
    .stat-icon{font-size:26px}
    .stat-val{font-size:30px;font-weight:800;color:#f8fafc}
    .stat-lbl{font-size:13px;color:#64748b}
    .stat-sub{font-size:11px;color:#10b981;background:rgba(16,185,129,0.1);padding:2px 8px;border-radius:20px;font-weight:600;align-self:flex-start}

    /* Badges */
    .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
    .badge-online{color:#10b981;background:rgba(16,185,129,0.15)}
    .badge-offline{color:#64748b;background:rgba(100,116,139,0.15)}
    .badge-active{color:#3b82f6;background:rgba(59,130,246,0.15)}
    .badge-published{color:#10b981;background:rgba(16,185,129,0.15)}
    .badge-draft{color:#64748b;background:rgba(100,116,139,0.15)}
    .badge-completed{color:#a855f7;background:rgba(168,85,247,0.15)}
    .badge-student{color:#3b82f6;background:rgba(59,130,246,0.15)}
    .badge-teacher{color:#a855f7;background:rgba(168,85,247,0.15)}

    /* Status dot */
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-online{background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.2)}
    .dot-offline{background:#64748b}
    .dot-absent{background:#ef4444}

    /* Buttons */
    .btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
    .btn-primary{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
    .btn-ghost{background:transparent;border:1px solid #334155;color:#94a3b8}
    .btn-ghost:hover{color:#f8fafc;border-color:#64748b}
    .btn-sm{padding:7px 14px;font-size:13px}
    .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:none}

    /* Form elements */
    .inp{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f8fafc;font-size:14px;outline:none;transition:border .15s}
    .inp:focus{border-color:#3b82f6}
    .lbl{color:#94a3b8;font-size:13px;font-weight:500;display:block;margin-bottom:5px}
    .form-row{margin-bottom:14px}
    select.inp option{background:#1e293b}

    /* Table */
    table{width:100%;border-collapse:collapse}
    th{padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:600;border-bottom:1px solid #334155}
    td{padding:11px 12px;border-bottom:1px solid rgba(51,65,85,0.5);font-size:14px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(30,41,59,0.5)}

    /* Progress bar */
    .prog-wrap{height:6px;background:#334155;border-radius:3px;overflow:hidden;width:80px}
    .prog-bar{height:100%;border-radius:3px}

    /* Login */
    .login-box{background:rgba(30,41,59,0.97);backdrop-filter:blur(20px);border-radius:24px;padding:46px 38px;width:100%;max-width:430px;border:1px solid rgba(59,130,246,0.2);box-shadow:0 25px 60px rgba(0,0,0,0.5)}
    .login-title{text-align:center;margin-bottom:28px}
    .login-tag{font-size:12px;letter-spacing:4px;color:#3b82f6;font-weight:700;text-transform:uppercase;margin-bottom:8px}
    .login-h1{font-size:26px;font-weight:800;color:#f8fafc;line-height:1.2}
    .login-sub{color:#64748b;font-size:14px;margin-top:6px}
    .role-tabs{display:flex;background:#0f172a;border-radius:12px;padding:4px;margin-bottom:22px}
    .role-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
    .role-tab.active{background:#3b82f6;color:#fff}
    .role-tab:not(.active){background:transparent;color:#64748b}
    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1e40af,#3b82f6);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-login:disabled{background:#334155;cursor:not-allowed;box-shadow:none}
    .err-box{color:#ef4444;font-size:13px;margin-bottom:12px;background:rgba(239,68,68,0.1);padding:10px 14px;border-radius:8px;border:1px solid rgba(239,68,68,0.2)}
    .info-box{margin-top:18px;padding:10px;background:rgba(16,185,129,0.08);border-radius:10px;border:1px solid rgba(16,185,129,0.2);text-align:center;color:#64748b;font-size:12px}

    /* Test take */
    .timer-box{border-radius:16px;padding:12px 24px;text-align:center}
    .timer-lbl{font-size:12px;font-weight:600;color:#64748b}
    .timer-val{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums}
    .q-box{background:#0f172a;border-radius:12px;padding:20px;margin-bottom:14px;border:1px solid #334155}
    .opt-btn{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;text-align:left;font-size:14px;font-weight:500;margin-bottom:8px;transition:all .15s;display:flex;align-items:center;gap:10px}
    .opt-btn:hover{border-color:#475569;color:#f8fafc}
    .opt-btn.selected{border-color:#3b82f6;background:rgba(59,130,246,0.15);color:#3b82f6}
    .opt-ltr{font-weight:700;color:#3b82f6}

    /* Spinner */
    .spinner{width:42px;height:42px;border:4px solid #334155;border-top:4px solid #3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
    #spinner-page{min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#64748b;font-size:14px}

    /* Chat */
    .chat-wrap{display:grid;grid-template-columns:220px 1fr;gap:18px;height:calc(100vh - 90px)}
    .chat-side{background:#1e293b;border:1px solid #334155;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
    .chat-main{background:#1e293b;border:1px solid #334155;border-radius:16px;display:flex;flex-direction:column;overflow:hidden}
    .chat-hdr{padding:14px 18px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
    .chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
    .chat-inp-row{padding:12px 18px;border-top:1px solid #334155;display:flex;gap:10px}
    .msg-row{display:flex;gap:10px}
    .msg-row.me{flex-direction:row-reverse}
    .msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
    .msg-bubble{max-width:62%;background:#0f172a;border:1px solid #334155;border-radius:16px 16px 16px 4px;padding:10px 14px}
    .msg-bubble.me{background:linear-gradient(135deg,#1e40af,#3b82f6);border:none;border-radius:16px 16px 4px 16px}
    .msg-sender{font-size:11px;font-weight:600;margin-bottom:4px}
    .msg-text{font-size:14px;line-height:1.5;color:#f8fafc}
    .msg-time{font-size:10px;color:#475569;margin-top:3px}

    /* Notifications */
    .notif-item{display:flex;gap:10px;padding:10px;background:#0f172a;border-radius:10px;margin-bottom:8px;border-left:3px solid}
    .notif-text{font-size:13px;font-weight:500;color:#f8fafc}
    .notif-time{font-size:11px;color:#64748b;margin-top:2px}

    /* Page header */
    .page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px}
    .page-title{font-size:26px;font-weight:800;color:#f8fafc}
    .page-sub{font-size:14px;color:#64748b;margin-top:3px}

    /* Misc */
    .empty-state{text-align:center;padding:50px 20px;color:#64748b}
    .empty-icon{font-size:48px;margin-bottom:14px}
    .row-center{display:flex;align-items:center;gap:8px}
    .col{display:flex;flex-direction:column;gap:6px}
    .mt16{margin-top:16px}
    .mb16{margin-bottom:16px}
    .chip{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
    .chip-green{color:#10b981;background:rgba(16,185,129,0.1)}
    .chip-blue{color:#3b82f6;background:rgba(59,130,246,0.1)}
  </style>
</head>
<body>

<div id="spinner-page">
  <div class="spinner"></div>
  Duke u lidhur me Firebase...
</div>

<div id="login-page" style="display:none">
  <div id="login-wrap">
    <div class="login-box fade">
      <div class="login-title">
        <div class="login-tag">FSHN</div>
        <h1 class="login-h1">Studentët FSHN<br><span style="color:#3b82f6">Analistike</span></h1>
        <p class="login-sub">Platformë Profesionale Akademike</p>
      </div>
      <div class="role-tabs">
        <button class="role-tab active" id="tab-student" onclick="setRole('student')">🎓 Nxënës</button>
        <button class="role-tab" id="tab-teacher" onclick="setRole('teacher')">👨‍🏫 Mësues</button>
      </div>
      <div id="reg-name-row" class="form-row" style="display:none">
        <label class="lbl">Emri i Plotë</label>
        <input class="inp" id="inp-name" placeholder="Emri Mbiemri"/>
      </div>
      <div class="form-row">
        <label class="lbl">Email</label>
        <input class="inp" id="inp-email" type="email" placeholder="emri@fshn.al"/>
      </div>
      <div class="form-row">
        <label class="lbl">Fjalëkalimi</label>
        <input class="inp" id="inp-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleAuth()"/>
      </div>
      <div id="reg-code-row" class="form-row" style="display:none">
        <label class="lbl">Kodi i Klasës</label>
        <input class="inp" id="inp-code" placeholder="p.sh. FSHN2024"/>
      </div>
      <div id="auth-error" class="err-box" style="display:none"></div>
      <button class="btn-login" id="btn-auth" onclick="handleAuth()">Hyr në Platformë →</button>
      <p style="text-align:center;margin-top:18px;color:#64748b;font-size:14px">
        <span id="auth-switch-text">Nuk ke llogari?</span>
        <span onclick="toggleMode()" style="color:#3b82f6;cursor:pointer;font-weight:600;margin-left:4px" id="auth-switch-link">Regjistrohu</span>
      </p>
      <div class="info-box">🔥 Firebase Auth · Firestore · Real-Time</div>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sb-brand">
        <div class="tag">FSHN · ANALISTIKE</div>
        <div class="title">Studentët FSHN</div>
        <div class="sub">Klasë 2024/2025</div>
        <div class="live"><span></span> 🔥 Firebase Live</div>
      </div>
      <div class="sb-nav" id="sb-nav"></div>
      <div class="sb-user">
        <div class="uinfo">
          <div class="avatar" id="sb-avatar">U</div>
          <div>
            <div class="uname" id="sb-name">—</div>
            <div class="urole" id="sb-role">●</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()">⬅ Dil</button>
      </div>
    </div>
    <!-- Main content -->
    <div id="main"></div>
  </div>
</div>

<script>
// ─── FIREBASE CONFIG ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyChKAsK5d6qJJ1OOHMYuulcBYX7RCC4iis",
  authDomain: "studentet-fshn.firebaseapp.com",
  projectId: "studentet-fshn",
  storageBucket: "studentet-fshn.firebasestorage.app",
  messagingSenderId: "1033057546262",
  appId: "1:1033057546262:web:34ae43eed24a6042abc537"
});
const auth = firebase.auth();
const db = firebase.firestore();

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = 'dashboard';
let isRegister = false;
let selectedRole = 'student';
let students = [], tests = [], assignments = [];
let unsubStudents, unsubTests, unsubAssignments;
let testTimerInterval = null;
let activeTestData = null;
let testAnswers = {};
let chartInstances = {};

// ─── AUTH MODE ────────────────────────────────────────────────────────────────
function setRole(r) {
  selectedRole = r;
  document.getElementById('tab-student').classList.toggle('active', r === 'student');
  document.getElementById('tab-teacher').classList.toggle('active', r === 'teacher');
  if (isRegister && r === 'student') document.getElementById('reg-code-row').style.display = '';
  else document.getElementById('reg-code-row').style.display = 'none';
}

function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('reg-name-row').style.display = isRegister ? '' : 'none';
  document.getElementById('reg-code-row').style.display = (isRegister && selectedRole === 'student') ? '' : 'none';
  document.getElementById('auth-switch-text').textContent = isRegister ? 'Ke llogari?' : 'Nuk ke llogari?';
  document.getElementById('auth-switch-link').textContent = isRegister ? 'Hyr' : 'Regjistrohu';
  document.getElementById('btn-auth').textContent = isRegister ? 'Regjistrohu →' : 'Hyr në Platformë →';
  document.getElementById('auth-error').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = '';
}

async function handleAuth() {
  const email = document.getElementById('inp-email').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const name = document.getElementById('inp-name').value.trim();
  const code = document.getElementById('inp-code').value.trim();
  document.getElementById('auth-error').style.display = 'none';
  if (!email || !pass) { showAuthError('Plotësoni të gjitha fushat.'); return; }
  if (isRegister && !name) { showAuthError('Shkruani emrin tuaj.'); return; }
  const btn = document.getElementById('btn-auth');
  btn.disabled = true; btn.textContent = 'Duke u lidhur...';
  try {
    if (isRegister) {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      const avatar = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      await db.collection('users').doc(cred.user.uid).set({
        uid: cred.user.uid, name, email, role: selectedRole, classCode: code,
        avatar, status: 'online', attendance: 0, avgGrade: 0, tests: 0, assignments: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Email-i nuk ekziston.',
      'auth/wrong-password': 'Fjalëkalim i gabuar.',
      'auth/email-already-in-use': 'Email tashmë i regjistruar.',
      'auth/weak-password': 'Fjalëkalimi duhet 6+ karaktere.',
      'auth/invalid-credential': 'Email ose fjalëkalim i gabuar.',
      'auth/invalid-email': 'Email i pavlefshëm.'
    };
    showAuthError(msgs[e.code] || e.message || 'Gabim.');
    btn.disabled = false;
    btn.textContent = isRegister ? 'Regjistrohu →' : 'Hyr në Platformë →';
  }
}

async function doLogout() {
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).update({ status: 'offline' }).catch(() => {});
  }
  if (unsubStudents) unsubStudents();
  if (unsubTests) unsubTests();
  if (unsubAssignments) unsubAssignments();
  await auth.signOut();
}

// ─── AUTH LISTENER ────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async fbUser => {
  document.getElementById('spinner-page').style.display = 'none';
  if (fbUser) {
    const snap = await db.collection('users').doc(fbUser.uid).get();
    if (snap.exists) {
      currentUser = { ...snap.data(), uid: fbUser.uid };
      await db.collection('users').doc(fbUser.uid).update({ status: 'online' }).catch(() => {});
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('main-app').style.display = '';
      initApp();
    } else {
      document.getElementById('login-page').style.display = '';
    }
  } else {
    currentUser = null;
    document.getElementById('login-page').style.display = '';
    document.getElementById('main-app').style.display = 'none';
    const btn = document.getElementById('btn-auth');
    if (btn) { btn.disabled = false; btn.textContent = isRegister ? 'Regjistrohu →' : 'Hyr në Platformë →'; }
  }
});

// ─── APP INIT ─────────────────────────────────────────────────────────────────
function initApp() {
  // Sidebar
  document.getElementById('sb-avatar').textContent = currentUser.avatar || 'U';
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = '● ' + (currentUser.role === 'teacher' ? 'Mësues' : 'Nxënës');

  const nav = currentUser.role === 'teacher'
    ? [['dashboard','📊','Dashboard'],['students','👥','Nxënësit'],['tests','📝','Testime'],['assignments','📚','Detyra'],['chat','💬','Chat'],['analytics','📈','Analitikë']]
    : [['dashboard','🏠','Dashboard'],['tests','📝','Testime'],['assignments','📚','Detyra'],['chat','💬','Chat'],['profile','👤','Profili Im']];

  const sbNav = document.getElementById('sb-nav');
  sbNav.innerHTML = nav.map(([id, ico, lbl]) =>
    `<button class="nav-btn${id===currentPage?' active':''}" id="nav-${id}" onclick="navigate('${id}')"><span class="ico">${ico}</span>${lbl}</button>`
  ).join('');

  // Firestore listeners
  unsubStudents = db.collection('users').where('role','==','student').onSnapshot(snap => {
    students = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if (currentPage === 'dashboard' || currentPage === 'students' || currentPage === 'analytics') renderPage();
  });

  db.collection('tests').orderBy('createdAt','desc').onSnapshot(snap => {
    tests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentPage === 'tests') renderPage();
  }, () => {
    db.collection('tests').get().then(snap => { tests = snap.docs.map(d=>({id:d.id,...d.data()})); if(currentPage==='tests') renderPage(); });
  });

  db.collection('assignments').orderBy('createdAt','desc').onSnapshot(snap => {
    assignments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentPage === 'assignments') renderPage();
  }, () => {
    db.collection('assignments').get().then(snap => { assignments = snap.docs.map(d=>({id:d.id,...d.data()})); if(currentPage==='assignments') renderPage(); });
  });

  renderPage();
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  // Destroy charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  switch(currentPage) {
    case 'dashboard': main.innerHTML = currentUser.role === 'teacher' ? teacherDashboardHTML() : studentDashboardHTML(); break;
    case 'students': main.innerHTML = studentsHTML(); break;
    case 'tests': main.innerHTML = testsListHTML(); break;
    case 'assignments': main.innerHTML = assignmentsHTML(); break;
    case 'chat': main.innerHTML = chatHTML(); initChat(); break;
    case 'analytics': main.innerHTML = analyticsHTML(); break;
    case 'profile': main.innerHTML = profileHTML(); break;
    case 'test-create': main.innerHTML = testCreateHTML(); break;
    case 'assignment-create': main.innerHTML = assignmentCreateHTML(); break;
  }
  setTimeout(() => initCharts(), 100);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function badge(status) {
  const m = { online:'online',offline:'offline',active:'active',published:'published',draft:'draft',completed:'completed',student:'student',teacher:'teacher' };
  const labels = { online:'Online',offline:'Offline',active:'Aktiv',published:'Publikuar',draft:'Draft',completed:'Përfunduar',student:'Nxënës',teacher:'Mësues' };
  const cls = 'badge badge-' + (m[status] || 'draft');
  return `<span class="${cls}">${labels[status] || status}</span>`;
}
function dot(status) {
  const cls = status === 'online' ? 'dot dot-online' : status === 'absent' ? 'dot dot-absent' : 'dot dot-offline';
  return `<span class="${cls}"></span>`;
}
function av(text, size=32) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.35)}px">${text||'U'}</div>`;
}
function progBar(val, max=100) {
  const pct = Math.min((val/max)*100, 100);
  const color = pct > 80 ? '#10b981' : pct > 60 ? '#f59e0b' : '#ef4444';
  return `<div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${color}"></div></div>`;
}
function fmtTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('sq-AL',{hour:'2-digit',minute:'2-digit'});
}

async function activateTest(id) {
  await db.collection('tests').doc(id).update({ status: 'active' });

function startTest(testId) {
  const t = tests.find(x=>x.id===testId);
  if (!t) return;
  activeTestData = t;
  testAnswers = {};
  Object.values(chartInstances).forEach(c=>c.destroy()); chartInstances={};
  document.getElementById('main').innerHTML = testTakeHTML(t);
  let secs = (t.duration||45)*60;
  if (testTimerInterval) clearInterval(testTimerInterval);
  testTimerInterval = setInterval(()=>{
    secs--;
    const el = document.getElementById('timer-val');
    if (el) { el.textContent = fmtSecs(secs); el.style.color = secs<300?'#ef4444':'#f8fafc'; }
    if (secs <= 0) { clearInterval(testTimerInterval); submitTest(); }
  },1000);
}

function fmtSecs(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function selectOpt(qId, idx, type) {
  testAnswers[qId] = idx;

  if (el) el.classList.add('selected');
}

async function submitTest() {
  if (testTimerInterval) clearInterval(testTimerInterval);

    await db.collection('testAttempts').add({

      <div style="background:#3b82f6;color:#fff;border-radius:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">${qi+1}</div>

        <input class="inp" placeholder="Shkruaj pyetjen..." value="${q.text||''}" oninput="newQuestions[${qi}].text=this.value" style="margin-bottom:10px"/>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <select class="inp" style="width:auto" onchange="newQuestions[${qi}].type=this.value;refreshQuestions()">
            <option value="mcq"${q.type==='mcq'?' selected':''}>Me Alternativa</option>
            <option value="open"${q.type==='open'?' selected':''}>Përgjigje e Hapur</option>
            <option value="tf"${q.type==='tf'?' selected':''}>E Vërtetë / E Gabuar</option>
          </select>
          <input class="inp" type="number" value="${q.points}" style="width:80px" oninput="newQuestions[${qi}].points=+this.value;updateQPts()"/>
          <button class="btn btn-sm btn-danger" onclick="removeQuestion(${qi})">🗑 Fshi</button>
        </div>
      </div>
    </div>
    ${q.type==='mcq'?`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-left:38px">
      ${(q.options||['','','','']).map((opt,oi)=>`
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:#3b82f6;font-weight:700;width:18px">${String.fromCharCode(65+oi)}.</span>
        <input class="inp" value="${opt}" placeholder="Opsioni ${String.fromCharCode(65+oi)}" oninput="newQuestions[${qi}].options[${oi}]=this.value" style="border-color:${q.correct===oi?'#10b981':''}"/>
        <button onclick="newQuestions[${qi}].correct=${oi};refreshQuestions()" style="padding:3px 8px;border-radius:6px;border:none;background:${q.correct===oi?'#10b981':'#334155'};color:#fff;cursor:pointer;font-size:11px">✓</button>
      </div>`).join('')}
    </div>`:q.type==='tf'?`
    <div style="display:flex;gap:10px;margin-left:38px">
      ${['E Vërtetë','E Gabuar'].map((opt,oi)=>`
      <button onclick="newQuestions[${qi}].correct=${oi};refreshQuestions()" style="padding:8px 20px;border-radius:8px;border:2px solid ${q.correct===oi?'#10b981':'#334155'};background:${q.correct===oi?'rgba(16,185,129,0.15)':'transparent'};color:${q.correct===oi?'#10b981':'#94a3b8'};cursor:pointer;font-weight:600;font-size:13px">${opt}</button>`).join('')}
    </div>`:''}
  </div>`).join('');
}

function addNewQuestion() {
  newQuestions.push({ id: Date.now(), text:'', type:'mcq', points:10, options:['','','',''], correct:0 });
  refreshQuestions();
}
function removeQuestion(idx) { newQuestions.splice(idx,1); refreshQuestions(); }
function refreshQuestions() {
  const el = document.getElementById('questions-list');
  if (el) el.innerHTML = renderQuestionsList();
  const c = document.getElementById('q-count'); if(c) c.textContent = newQuestions.length;
  const c2 = document.getElementById('q-count2'); if(c2) c2.textContent = newQuestions.length;
  updateQPts();
}
function updateQPts() {
  const el = document.getElementById('q-pts');
  if (el) el.textContent = newQuestions.reduce((s,q)=>s+q.points,0);
}

async function saveNewTest(status) {
  if (!newTestData.title) { alert('Shkruani titullin!'); return; }
  const btn = document.getElementById(status==='draft'?'btn-draft':'btn-publish');
  if (btn) { btn.disabled=true; btn.textContent='Duke ruajtur...'; }
  try {
    await db.collection('tests').add({
      ...newTestData, status, questions: newQuestions,
      createdBy: currentUser.uid, createdByName: currentUser.name,
      date: new Date().toISOString().split('T')[0],
      participants:0, avgScore:0, passRate:0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    newTestData = { title:'', description:'', duration:45, totalPoints:100 };
    newQuestions = [];
    navigate('tests');
  } catch(e) { alert('Gabim: '+e.message); if(btn){btn.disabled=false;btn.textContent=status==='draft'?'💾 Draft → Firestore':'📤 Shpërnda → Firebase';} }
}

async function submitAssignment(id) {
  const el = document.getElementById('atext-'+id);
  const text = el ? el.value : '';
  try {
    await db.collection('assignmentSubmissions').add({
      assignmentId: id, studentId: currentUser.uid, studentName: currentUser.name,
      text, submittedAt: firebase.firestore.FieldValue.serverTimestamp(), status: 'submitted'
    });
    await db.collection('users').doc(currentUser.uid).update({ assignments: (currentUser.assignments||0)+1 });
    currentUser.assignments = (currentUser.assignments||0)+1;
    submittedAssignments[id] = true;
    alert('✅ Dorëzuar në Firestore!');
    renderPage();
  } catch(e) { alert('Gabim: '+e.message); }
}

function initChat() {
  if (chatUnsub) chatUnsub();
  chatUnsub = db.collection('messages').orderBy('createdAt','asc').onSnapshot(snap => {
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    const el = document.getElementById('chat-msgs');
    const cnt = document.getElementById('msg-count');
    if (!el) return;
    if (cnt) cnt.textContent = msgs.length + ' mesazhe';
    el.innerHTML = msgs.map(msg=>{
      const isMe = msg.uid === currentUser.uid;
      const bgAv = msg.role==='teacher'?'linear-gradient(135deg,#7c3aed,#a855f7)':'linear-gradient(135deg,#1e40af,#3b82f6)';
      return `
      <div class="msg-row${isMe?' me':''}">
        <div class="msg-av" style="background:${bgAv}">${msg.avatar||'U'}</div>
        <div>
          <div style="display:flex;gap:8px;align-items:baseline;flex-direction:${isMe?'row-reverse':'row'}">
            <span style="color:${msg.role==='teacher'?'#a855f7':'#94a3b8'};font-size:12px;font-weight:600">${msg.sender}</span>
            <span style="color:#475569;font-size:10px">${fmtTime(msg.createdAt)}</span>
          </div>
          <div class="msg-bubble${isMe?' me':''}"><p class="msg-text">${msg.text}</p></div>
        </div>
      </div>`;
    }).join('') || '<div style="text-align:center;color:#64748b;padding:20px">Asnjë mesazh ende. Filloni bisedën!</div>';
    el.scrollTop = el.scrollHeight;
  });
}

async function sendMsg() {
  const inp = document.getElementById('chat-inp');
  if (!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  await db.collection('messages').add({
    sender: currentUser.name, role: currentUser.role, text,
    avatar: currentUser.avatar||'U', uid: currentUser.uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}
